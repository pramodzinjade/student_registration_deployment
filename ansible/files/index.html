<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298,#00c6ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    overflow:hidden;
}

.header{
    background:linear-gradient(90deg,#0f4c81,#00b4db);
    color:#fff;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:32px;
}

.header p{
    margin-top:8px;
    opacity:.9;
}

form{
    padding:35px;
}

.section-title{
    color:#0f4c81;
    margin-bottom:15px;
    border-left:5px solid #00b4db;
    padding-left:10px;
    font-size:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    font-weight:600;
    margin-bottom:8px;
    color:#333;
}

.input-group input,
.input-group select,
.input-group textarea{
    padding:12px 15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus,
.input-group select:focus,
.input-group textarea:focus{
    outline:none;
    border-color:#00b4db;
    box-shadow:0 0 8px rgba(0,180,219,.3);
}

textarea{
    resize:none;
}

.full{
    grid-column:1/3;
}

.gender{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.gender label{
    font-weight:500;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    border:none;
    padding:14px 35px;
    font-size:16px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.submit{
    background:#00b894;
    color:#fff;
}

.submit:hover{
    background:#009e7f;
    transform:translateY(-2px);
}

.reset{
    background:#e74c3c;
    color:#fff;
}

.reset:hover{
    background:#c0392b;
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    background:#f5f5f5;
    padding:15px;
    color:#666;
    font-size:14px;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:1;
}

.buttons{
flex-direction:column;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🎓 Student Registration Form</h1>
<p>Fill in your details to complete registration</p>
</div>

<form>

<h2 class="section-title">Personal Information</h2>

<div class="grid">

<div class="input-group">
<label>First Name</label>
<input type="text" placeholder="Enter First Name" required>
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" placeholder="Enter Last Name" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="example@gmail.com" required>
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="tel" placeholder="+91 9876543210">
</div>

<div class="input-group">
<label>Date of Birth</label>
<input type="date">
</div>
<div class="input-group">
<label>Course</label>
<select>
<option>Select Course</option>
<option>BCA</option>
<option>B.Sc</option>
<option>B.Tech</option>
<option>B.Com</option>
<option>MCA</option>
<option>M.Tech</option>
<option>MBA</option>
</select>
</div>

<div class="input-group full">
<label>Gender</label>

<div class="gender">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Other</label>
</div>

</div>

<div class="input-group full">
<label>Address</label>
<textarea rows="4" placeholder="Enter Full Address"></textarea>
</div>

<div class="input-group">
<label>City</label>
<input type="text">
</div>

<div class="input-group">
<label>State</label>
<input type="text">
</div>

<div class="input-group">
<label>Zip Code</label>
<input type="text">
</div>

<div class="input-group">
<label>Country</label>
<input type="text" value="India">
</div>

<div class="input-group full">
<label>Upload Photo</label>
<input type="file">
</div>

</div>

<div class="buttons">
<button class="submit" type="submit">Register</button>
<button class="reset" type="reset">Reset</button>
</div>

</form>

<div class="footer">
© 2026 Student Registration Portal | Designed with ❤️
</div>

</div>

</body>
</html>
