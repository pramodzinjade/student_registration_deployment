---
- name: install dependency
  host: 
  become: true
  tasks: installation
  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: present
  - name: start and enable nginx
    ansible.builtin.service:
      name: nginx
      state: started
      enable: true
  - name: copy the file 
    ansible.builtin.copy:
      src: ../files/index.html
      dest: /var/www/html/index.html
  - name: restart nginx
    ansible.builtin.service:
      name: nginx
      state: restarted
